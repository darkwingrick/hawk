name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          crate_version=$(grep -m1 '^version = "' crates/hawk/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          if [[ -z "${crate_version}" ]]; then
            echo "Could not determine crates/hawk version."
            exit 1
          fi

          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [[ -z "${latest_tag}" ]]; then
            seed_version="${crate_version}"
          else
            stripped="${latest_tag#v}"
            seed_version=$(printf '%s\n%s\n' "${stripped}" "${crate_version}" | sort -V | tail -n 1)
            IFS='.' read -r major minor patch <<< "${seed_version}"
            if [[ -z "${major}" || -z "${minor}" || -z "${patch}" ]]; then
              echo "Version ${seed_version} is not semver-compatible (expected X.Y.Z)."
              exit 1
            fi
            next_patch=$((patch + 1))
            next_version="${major}.${minor}.${next_patch}"
          fi

          if [[ -z "${latest_tag}" ]]; then
            IFS='.' read -r major minor patch <<< "${seed_version}"
            if [[ -z "${major}" || -z "${minor}" || -z "${patch}" ]]; then
              echo "Version ${seed_version} is not semver-compatible (expected X.Y.Z)."
              exit 1
            fi
            next_patch=$((patch + 1))
            next_version="${major}.${minor}.${next_patch}"
          fi

          next_tag="v${next_version}"
          if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; then
            echo "Tag ${next_tag} already exists."
            exit 1
          fi

          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "Will publish ${next_tag}"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Hawk macOS bundle
        env:
          HAWK_APP_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          echo "stable" > crates/hawk/RELEASE_CHANNEL
          ./script/bundle-mac aarch64-apple-darwin

      - name: Package updater artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist

          dmg_path="target/aarch64-apple-darwin/release/Hawk-aarch64.dmg"
          if [[ ! -f "${dmg_path}" ]]; then
            echo "Expected DMG not found at ${dmg_path}"
            exit 1
          fi

          cp "${dmg_path}" dist/hawk-macos-aarch64.dmg

          (
            cd dist
            shasum -a 256 hawk-macos-aarch64.dmg > SHA256SUMS
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Hawk ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/hawk-macos-aarch64.dmg
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
